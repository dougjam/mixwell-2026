# =============================================================================
# Shadertoy gallery
# =============================================================================
# Each entry renders as a card. Clicking the card opens `viewUrl` in a new tab.
# The optional "Run inline" affordance lazily injects a single Shadertoy iframe
# only after the user clicks it, so nothing compiles on page load.
#
# `embedUrl` is optional; if omitted it is derived from `viewUrl` by swapping
# `/view/` for `/embed/`. Fill in real IDs/URLs as shaders are published.
# =============================================================================

